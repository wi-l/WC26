<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC26">
<meta name="theme-color" content="#0b0e12">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="manifest" href="manifest.webmanifest">
<title>WC26</title>
<style>
  :root {
    --bg: #0b0e12;
    --panel: #151b22;
    --panel2: #1b232c;
    --line: #2a3540;
    --text: #e7edf3;
    --muted: #8b9aa8;
    --accent: #f5c451;
    --au: #3ddc84;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 0 12px calc(env(safe-area-inset-bottom) + 24px);
  }
  .sub { color: var(--muted); font-size: 13px; }
  nav#tabs {
    position: sticky; top: 0; z-index: 3;
    display: flex; gap: 6px;
    padding: calc(env(safe-area-inset-top) + 8px) 0 8px;
    background: var(--bg);
  }
  nav#tabs button {
    flex: 1; padding: 9px 0; font-size: 14px; font-weight: 600;
    color: var(--muted); background: var(--panel); border: 1px solid var(--line);
    border-radius: 9px; cursor: pointer;
  }
  nav#tabs button.active { color: var(--bg); background: var(--accent); border-color: var(--accent); }
  .daygroup { margin-top: 20px; }
  .dayhead {
    position: sticky; top: calc(env(safe-area-inset-top) + 53px);
    background: var(--bg);
    padding: 8px 4px;
    font-size: 15px; font-weight: 700;
    border-bottom: 1px solid var(--line);
    z-index: 2;
  }
  .dayhead.today { color: var(--accent); }
  .dayhead .count { color: var(--muted); font-weight: 400; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 10px 6px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  .time { white-space: nowrap; width: 1%; }
  .time .clock { font-weight: 700; font-variant-numeric: tabular-nums; }
  .time .rel { display: block; color: var(--muted); font-size: 12px; }
  .match .teams { font-weight: 600; }
  .match .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .match.tappable { cursor: pointer; }
  .match.tappable:active { background: var(--panel2); }
  tr.au .match .teams { color: var(--au); }
  .score { text-align: right; width: 1%; white-space: nowrap; }
  .reveal {
    display: inline-block; min-width: 48px; text-align: center;
    padding: 5px 9px; border-radius: 8px;
    background: var(--panel2); border: 1px solid var(--line);
    font-variant-numeric: tabular-nums; cursor: pointer; user-select: none;
  }
  .reveal.hidden { color: transparent; text-shadow: 0 0 11px rgba(231,237,243,.85); }
  .reveal.ft { color: var(--text); }
  .reveal.upcoming { background: transparent; border-color: transparent; color: var(--muted); cursor: default; }
  .tag { font-size: 11px; color: var(--muted); }
  .standings { width: 100%; border-collapse: collapse; margin-top: 4px; }
  .standings th, .standings td { padding: 7px 4px; text-align: center; font-size: 13px; }
  .standings th { color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--line); }
  .standings td { border-bottom: 1px solid var(--line); font-variant-numeric: tabular-nums; }
  .standings .teamcol { text-align: left; font-weight: 600; }
  .standings tr.au .teamcol { color: var(--au); }
  .standings .pts { font-weight: 700; }
  .standings .qual { box-shadow: inset 3px 0 0 var(--accent); }
  footer { color: var(--muted); font-size: 12px; text-align: center; margin-top: 28px; }
  .err { color: #ff7a7a; padding: 16px 4px; }
</style>
</head>
<body>
<nav id="tabs">
  <button data-view="day">Day</button>
  <button data-view="group">Group</button>
  <button data-view="knockout">Knockout</button>
  <button data-view="table">Table</button>
</nav>
<main id="app"><div class="sub" style="padding:16px 4px">Loading…</div></main>
<footer id="foot"></footer>
<script src="app.js"></script>
</body>
</html>
